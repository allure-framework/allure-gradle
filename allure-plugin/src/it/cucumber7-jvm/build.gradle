plugins {
    id 'java'
    id 'io.qameta.allure'
}

allure {
    adapter {
        frameworks {
            cucumber7jvm {
                version = "2.35.2"
            }
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('io.cucumber:cucumber-bom:7.34.3')
    testImplementation 'io.cucumber:cucumber-junit'
    testImplementation 'io.cucumber:cucumber-java'

    testImplementation 'junit:junit:4.13.2'
}

test {
    useJUnit()
}
