plugins {
    id 'java'
    id 'io.qameta.allure'
}

allure {
    version = '2.42.1'
    aspectjweaver = true

    adapter {
        frameworks {
            junit4 {
                version = "2.35.2"
            }
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}

test {
    useJUnit()
}
