plugins {
    id 'java'
    id 'io.qameta.allure'
}

repositories {
    mavenCentral()
}

test {
    useJUnitPlatform()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.8.1')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

allure {
    version = "2.38.1"
    adapter.allureJavaVersion = "2.14.0"
}
